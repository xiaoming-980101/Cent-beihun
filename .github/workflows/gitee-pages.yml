# Gitee Pages 自动部署
# 构建完成后自动推送到 Gitee 的 gh-pages 分支

name: Deploy to Gitee Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prepare dist for Gitee Pages
        run: |
          # 创建 .nojekyll 文件，防止 Gitee 忽略 _开头的文件
          touch dist/.nojekyll
          # 复制 CNAME 配置（如果有自定义域名）
          # cp CNAME dist/CNAME 2>/dev/null || true

      - name: Push to Gitee Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GITEE_TOKEN }}
          external_repository: ${{ secrets.GITEE_REPO }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
          commit_message: 'Deploy from GitHub Actions'