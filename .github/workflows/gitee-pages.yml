# Gitee Pages 自动部署
# 构建完成后自动推送到 Gitee 的 gh-pages 分支

name: Deploy to Gitee Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prepare dist for Gitee Pages
        run: |
          # 创建 .nojekyll 文件，防止 Gitee 忽略 _开头的文件
          touch dist/.nojekyll
          # 创建 CNAME 文件（如果有自定义域名可以取消注释）
          # echo "your-domain.com" > dist/CNAME

      - name: Deploy to Gitee Pages
        run: |
          cd dist
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy from GitHub Actions - $(date '+%Y-%m-%d %H:%M:%S')"

          # 使用 GITEE_TOKEN 推送到 Gitee
          git remote add origin https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_REPO }}.git
          git branch -M gh-pages
          git push -f origin gh-pages

          echo "✅ 部署成功！访问地址：https://${{ secrets.GITEE_REPO }}.gitee.io"